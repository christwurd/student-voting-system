<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Election Results - CWU Voting</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-page">
    <aside class="sidebar">
        <div class="sidebar-header"><i class="fas fa-university"></i><span>CWU Voting</span></div>
        <nav class="sidebar-nav">
            <a href="student-dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="results.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>Results</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header glass-effect">
            <h2>Live Election Results</h2>
            <div class="header-actions">
                <button class="btn btn-outline"><i class="fas fa-file-csv"></i> Export CSV</button>
                <button class="btn btn-primary"><i class="fas fa-file-pdf"></i> Export PDF</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card dashboard-stat glass-effect" style="grid-column: span 2;">
                <h3 style="width:100%; text-align:center; margin-bottom:20px;">Vote Distribution (President)</h3>
                <div style="height: 300px; width: 100%;"><canvas id="barChart"></canvas></div>
            </div>
            <div class="stat-card dashboard-stat glass-effect">
                <h3 style="width:100%; text-align:center; margin-bottom:20px;">Voter Turnout</h3>
                <div style="height: 300px; width: 100%;"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <div class="section">
            <h2>Candidate Standings</h2>
            <table class="data-table" style="margin-top: 20px;">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Candidate</th>
                        <th>Position</th>
                        <th>Votes</th>
                        <th>Percentage</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><strong>Alex Chen</strong></td>
                        <td>President</td>
                        <td>845</td>
                        <td><span class="status-badge status-active">42.3%</span></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td><strong>Maya Rodriguez</strong></td>
                        <td>President</td>
                        <td>712</td>
                        <td><span class="status-badge status-upcoming">35.7%</span></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td><strong>James Okoro</strong></td>
                        <td>President</td>
                        <td>440</td>
                        <td><span class="status-badge status-closed">22.0%</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        // Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Alex Chen', 'Maya Rodriguez', 'James Okoro'],
                datasets: [{
                    label: 'Votes',
                    data: [845, 712, 440],
                    backgroundColor: ['#6366f1', '#ec4899', '#06b6d4'],
                    borderRadius: 8
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // Pie Chart
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['Voted', 'Pending'],
                datasets: [{
                    data: [1284, 1216],
                    backgroundColor: ['#10b981', '#e2e8f0'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
