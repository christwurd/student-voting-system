<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote Confirmed - CWU Voting</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .success-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .receipt-card {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 400px;
            width: 100%;
            margin: 30px 0;
        }
        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: #f1f5f9;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 80px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Thank You for Voting!</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Your vote has been securely recorded and encrypted.</p>
        
        <div class="receipt-card">
            <div class="qr-placeholder"><i class="fas fa-qrcode"></i></div>
            <p style="font-weight: 600; margin-bottom: 5px;">Confirmation Number:</p>
            <h2 style="color: var(--primary); margin-bottom: 15px;" id="confNumber">V2026-884921</h2>
            <p style="font-size: 13px; color: var(--text-muted);">Scan QR code to verify your vote on the public ledger.</p>
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 15px;">Submitted: <span id="timestamp"></span></p>
        </div>

        <div style="display: flex; gap: 15px;">
            <a href="student-dashboard.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Return to Dashboard</a>
            <button class="btn btn-outline btn-lg" onclick="window.print()"><i class="fas fa-print"></i> Print Receipt</button>
        </div>
    </div>

    <script>
        // Generate random confirmation number
        document.getElementById('confNumber').textContent = 'V2026-' + Math.floor(100000 + Math.random() * 900000);
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
